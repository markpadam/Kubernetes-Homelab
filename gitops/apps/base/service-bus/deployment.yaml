apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicebus
  namespace: service-bus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicebus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: servicebus
    spec:
      containers:
        - name: servicebus
          # Pinned by digest — the servicebus-emulator MCR tag floats and the
          # vendor has not published a stable semver tag set. Digest matches
          # the build currently running in this lab.
          image: mcr.microsoft.com/azure-messaging/servicebus-emulator@sha256:a00c9626c8960f6b9be6178aa91a7ac8f1a102c0d9deda7603a1ba0ac9d9ab51
          # AMD64-only image — runs via Rosetta on Apple Silicon
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 5300
              name: management
          env:
            - name: ACCEPT_EULA
              value: "Y"
            - name: SQL_SERVER
              value: "mssql.azure-sql.svc.cluster.local"
            - name: MSSQL_SA_PASSWORD
              value: "AksLab!SqlDev1"
            - name: SQL_WAIT_INTERVAL
              value: "30"
            - name: CONFIG_PATH
              value: "/ServiceBus_Emulator/ConfigFiles/Config.json"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5300
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5300
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: config
              mountPath: /ServiceBus_Emulator/ConfigFiles
      volumes:
        - name: config
          configMap:
            name: servicebus-config
