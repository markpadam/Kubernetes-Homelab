# OAuth2 Proxy SSO annotations are added at runtime by lab-feature.sh when
# the oauth2-proxy component is enabled (mirrors the Azure AD Application
# Proxy pattern for protecting internal tools). Keeping them out of this
# manifest means the lab stays usable when oauth2-proxy is disabled — nginx
# isn't forced to call an upstream auth service that doesn't exist.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.aks-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
