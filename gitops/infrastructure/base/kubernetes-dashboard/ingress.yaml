apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubernetes-dashboard
  namespace: kubernetes-dashboard
  # OAuth2 Proxy SSO annotations are added at runtime by lab-feature.sh when
  # the oauth2-proxy component is enabled. See gitops/infrastructure/base/argocd/ingress.yaml.
  annotations:
    # Kong proxy (the dashboard's API gateway) serves HTTPS internally.
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: dashboard.aks-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubernetes-dashboard-kong-proxy
                port:
                  number: 443
