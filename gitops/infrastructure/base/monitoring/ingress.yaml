# OAuth2 Proxy SSO annotations are added at runtime by lab-feature.sh when
# the oauth2-proxy component is enabled. See gitops/infrastructure/base/argocd/ingress.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.aks-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80
