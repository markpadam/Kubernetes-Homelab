apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ddh-calendar-uploader-common-template
  namespace: ddh-poc
  labels:
    app: calendar-uploader
spec:
  entrypoint: run-calendar
  serviceAccountName: calendar-uploader

  # Manual submission parameters (visible in UI)
  arguments:
    parameters:
      - name: runHoliday
        description: "Run Holiday calendar upload"
        value: "false"
        enum: ["true", "false"]

      - name: runFutureMonthlyExpiry
        description: "Run Future Monthly Expiry upload"
        value: "false"
        enum: ["true", "false"]

      - name: runForwardMonthlyExpiry
        description: "Run Forward Monthly Expiry upload"
        value: "false"
        enum: ["true", "false"]

  templates:
    - name: run-calendar
      inputs:
        parameters:
          # isManualRun is NOT exposed in UI - defaults to true for manual runs
          # Only CronWorkflow can override this to false programmatically
          - name: isManualRun
            value: "true"
          - name: runHoliday
          - name: runFutureMonthlyExpiry
          - name: runForwardMonthlyExpiry

      container:
        image: ddh-calendar-uploader-tool:latest
        imagePullPolicy: Never
        # NOTE: Environment variables below are only needed for local Kubernetes testing.
        # In real environments (DEV/UAT/PROD), the application pulls configuration 
        # from Azure App Configuration service, not from Kubernetes secrets.
        env:
          - name: DOTNET_ENVIRONMENT
            value: "Development"
          - name: Topaz__Username
            valueFrom:
              secretKeyRef:
                name: calendar-uploader-secrets
                key: TOPAZ_USERNAME
          - name: Topaz__Password
            valueFrom:
              secretKeyRef:
                name: calendar-uploader-secrets
                key: TOPAZ_PASSWORD
          - name: Topaz__Environment
            valueFrom:
              secretKeyRef:
                name: calendar-uploader-secrets
                key: TOPAZ_ENVIRONMENT
          - name: Topaz__Endpoint
            valueFrom:
              secretKeyRef:
                name: calendar-uploader-secrets
                key: TOPAZ_ENDPOINT
        command: ["sh", "-c"]
        args:
          - |
            #!/bin/sh
            set -e

            CMD="dotnet Jeragm.Ddh.Calendar.UploaderTool.dll"

            echo "🗓️  Starting Calendar Uploader..."

            if [ "{{inputs.parameters.isManualRun}}" != "true" ]; then
              echo "Mode: Automated"
              ARGS="--Uploader:ManualRun:Enabled=false"
            else
              echo "Mode: Manual"
              i=0
              ARGS="--Uploader:ManualRun:Enabled=true"

              if [ "{{inputs.parameters.runHoliday}}" = "true" ]; then
                ARGS="$ARGS --Uploader:ManualRun:CalendarTypes:$i=Holiday"
                i=$((i + 1))
              fi

              if [ "{{inputs.parameters.runFutureMonthlyExpiry}}" = "true" ]; then
                ARGS="$ARGS --Uploader:ManualRun:CalendarTypes:$i=FutureMonthlyExpiry"
                i=$((i + 1))
              fi

              if [ "{{inputs.parameters.runForwardMonthlyExpiry}}" = "true" ]; then
                ARGS="$ARGS --Uploader:ManualRun:CalendarTypes:$i=ForwardMonthlyExpiry"
                i=$((i + 1))
              fi

              if [ $i -eq 0 ]; then
                echo "❌ Select at least one calendar type"
                exit 1
              fi
            fi

            echo "Running: $CMD $ARGS"
            $CMD $ARGS
