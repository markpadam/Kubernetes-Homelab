apiVersion: v1
kind: Secret
metadata:
  name: mssql-secret
  namespace: azure-sql
type: Opaque
stringData:
  # SA password — must meet SQL Server complexity: 8+ chars, upper, lower, digit, special.
  # Safe to commit; these are not real credentials.
  sa-password: "AksLab!SqlDev1"
  # Full connection strings for apps — mirrors Azure SQL connection string format.
  connection-string: "Server=mssql.azure-sql.svc.cluster.local,1433;Database=master;User Id=sa;Password=AksLab!SqlDev1;TrustServerCertificate=True;"
  connection-string-ado: "Data Source=mssql.azure-sql.svc.cluster.local,1433;Initial Catalog=master;User ID=sa;Password=AksLab!SqlDev1;TrustServerCertificate=True;"
