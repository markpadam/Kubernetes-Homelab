apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux/apps/prd
  # prune MUST stay false — see flux/clusters/dev/apps.yaml: the apps overlay
  # is intentionally empty (lab-feature.sh owns app lifecycles), so a pruning
  # Kustomization here can only ever delete kubectl-managed components.
  prune: false
  sourceRef:
    kind: GitRepository
    name: homelab
  dependsOn:
    - name: infrastructure
  wait: true
  timeout: 5m
