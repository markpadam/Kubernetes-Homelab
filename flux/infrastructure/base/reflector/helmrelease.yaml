apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector
spec:
  interval: 10m
  chart:
    spec:
      chart: reflector
      version: "7.1.288"
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
  values:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
