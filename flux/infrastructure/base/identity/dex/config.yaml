# This ConfigMap is generated by setup-lab.sh / resume-lab.sh using
# Python string.Template substitution — ${SAMBA_IP} is replaced at apply time
# with the actual Multipass VM IP. Do not edit the generated version in /tmp;
# edit this source file and re-run setup-lab.sh.
#
# The block between # LDAP-CONNECTOR-BEGIN and # LDAP-CONNECTOR-END is stripped
# by the renderer when SAMBA_IP is empty (i.e. samba-ad is not enabled), so Dex
# falls back to the static admin user only.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dex-config
  namespace: dex
data:
  config.yaml: |
    # Dex OIDC identity provider
    # Azure equivalent: Azure AD / Entra ID acting as an OIDC token issuer.
    # Dex wraps SambaAD (LDAP/Kerberos) into standard OAuth2/OIDC tokens
    # so that applications like OAuth2 Proxy don't need to know how to speak LDAP.

    issuer: https://dex.aks-lab.local:9444

    storage:
      type: memory   # in-memory — config is reapplied from this ConfigMap on restart

    web:
      http: 0.0.0.0:5556

    # Static fallback user — works without SambaAD.
    # When samba-ad is running the LDAP connector takes over as the primary
    # auth path; the static user remains as an emergency local account.
    # Password: AksLabAdmin1!
    enablePasswordDB: true
    staticPasswords:
      - email: "admin@corp.internal"
        hash: "$2y$10$4hADsXgHYFW0bMOnDUmkl.FeAFBZMdp7LeiSpJJ3cwoaHr0V0ZCRG"
        username: "admin"
        userID: "a8b9c0d1-e2f3-4a5b-6c7d-8e9f0a1b2c3d"

    # LDAP-CONNECTOR-BEGIN
    connectors:
      - type: ldap
        id: corp-ad
        name: Corp Active Directory
        # Azure equivalent: Azure AD Connect syncing on-prem AD to Entra ID.
        # Here Dex connects directly to SambaAD over LDAP.
        config:
          host: ${SAMBA_IP}:389
          insecureNoSSL: true
          insecureSkipVerify: true

          # Bind as Administrator to search the directory
          # Azure equivalent: the service account Azure AD Connect uses to read AD
          bindDN: CN=Administrator,CN=Users,DC=corp,DC=internal
          bindPW: ${AD_ADMIN_PASSWORD}

          # Map AD users to OIDC user objects
          userSearch:
            baseDN: DC=corp,DC=internal
            filter: "(objectClass=person)"
            username: sAMAccountName      # login field users type
            idAttr: DN                    # unique stable identifier
            emailAttr: userPrincipalName  # maps to email claim in JWT
            nameAttr: displayName         # maps to name claim in JWT

          # Map AD groups to OIDC groups claim
          groupSearch:
            baseDN: DC=corp,DC=internal
            filter: "(objectClass=group)"
            userAttr: DN
            groupAttr: member
            nameAttr: cn
    # LDAP-CONNECTOR-END

    oauth2:
      skipApprovalScreen: true   # skip the "Grant access?" consent screen in the lab

    staticClients:
      # OAuth2 Proxy is the only registered client.
      # Azure equivalent: an App Registration in Entra ID with a client secret.
      - id: oauth2-proxy
        secret: ${DEX_CLIENT_SECRET}
        redirectURIs:
          - https://oauth2-proxy.aks-lab.local:9444/oauth2/callback
        name: OAuth2 Proxy
