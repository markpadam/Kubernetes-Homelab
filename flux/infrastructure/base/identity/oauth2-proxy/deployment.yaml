apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          args:
            # OIDC provider — Dex running in-cluster
            # Azure equivalent: --provider=azure with a registered App Registration
            - --provider=oidc
            # Dex's issuer must match the `iss` claim in JWT tokens — use the external HTTPS URL.
            - --oidc-issuer-url=https://dex.aks-lab.local:9443
            - --insecure-oidc-allow-unverified-email=true
            # Skip auto-discovery: the discovery document returns internal cluster URLs for
            # all endpoints, which browsers cannot reach. We set each endpoint manually so
            # pod-to-pod calls use the internal service URL and browser redirects use the
            # external ingress URL.
            - --skip-oidc-discovery=true
            # Browser redirect — use external HTTPS URL
            - --login-url=https://dex.aks-lab.local:9443/auth
            # Pod-to-pod token exchange — keep internal HTTP (no TLS between pods)
            - --redeem-url=http://dex.dex.svc.cluster.local:5556/token
            - --oidc-jwks-url=http://dex.dex.svc.cluster.local:5556/keys

            # Redirect URL — must match the redirectURI registered in Dex
            - --redirect-url=https://oauth2-proxy.aks-lab.local:9443/oauth2/callback

            # Forward auth mode — OAuth2 Proxy validates sessions but does not
            # serve the upstream itself. NGINX handles the upstream proxy.
            - --upstream=file:///dev/null

            # Network
            - --http-address=0.0.0.0:4180

            # Restrict to corp.internal email addresses
            - --email-domain=corp.internal

            # Session cookie — secure flag required now that the lab uses TLS
            - --cookie-secure=true
            - --cookie-name=_oauth2_proxy_lab
            # Scope the cookie to the whole .aks-lab.local domain so all app
            # subdomains (taskflow, grafana, argocd, blob-explorer) receive it.
            - --cookie-domain=.aks-lab.local

            # Skip the Dex "pick a provider" screen (only one connector)
            - --skip-provider-button=true

            # Allow post-login redirects to any *.aks-lab.local subdomain.
            # Both forms required: the bare domain for standard HTTPS port 443, and the
            # :9443 variant for the port-forward tunnel used by the lab.
            - --whitelist-domain=.aks-lab.local
            - --whitelist-domain=.aks-lab.local:9443

            # Pass user identity to the backend via headers
            - --set-xauthrequest=true
            - --pass-access-token=true
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              value: oauth2-proxy
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - containerPort: 4180
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 20
            periodSeconds: 30
