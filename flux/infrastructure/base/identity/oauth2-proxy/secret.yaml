# This Secret is applied by setup-lab.sh BEFORE Flux picks up the kustomization,
# so that the cookie-secret and client-secret are present when the pod starts.
# setup-lab.sh generates a random 32-byte cookie secret and substitutes
# ${COOKIE_SECRET} and ${DEX_CLIENT_SECRET} using Python string.Template.
# Do not commit real secrets here — this file is a template only.
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: oauth2-proxy
type: Opaque
stringData:
  cookie-secret: "${COOKIE_SECRET}"
  client-secret: "${DEX_CLIENT_SECRET}"
