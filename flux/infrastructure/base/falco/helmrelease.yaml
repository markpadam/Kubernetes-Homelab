apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m
  chart:
    spec:
      chart: falco
      version: "4.22.0"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
  values:
    # Minikube on macOS runs Linux nodes inside the Docker driver — eBPF works,
    # but the modern eBPF probe (CO-RE) is the most portable choice across the
    # node-image kernel versions minikube ships.
    driver:
      kind: modern-ebpf
    collectors:
      enabled: true
      docker:
        enabled: false
        # Containerd is used by minikube — not Docker — even though the host
        # driver is "docker". Falco picks containerd up automatically.
    falcosidekick:
      enabled: true
      webui:
        enabled: true
        # The web UI lets you browse events without shelling into the node.
        # Accessible via the lab's NGINX ingress (see falco service docs).
        service:
          type: ClusterIP
    tty: true
    falco:
      json_output: true
      json_include_output_property: true
      log_level: info
      priority: debug
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
