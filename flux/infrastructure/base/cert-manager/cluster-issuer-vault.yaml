# ClusterIssuer backed by HashiCorp Vault PKI intermediate CA.
# Vault must be running and the pki_int/sign/web role must exist before
# cert-manager will transition this to Ready. cert-manager retries automatically,
# so this can be applied before the Vault feature is enabled.
#
# Azure equivalent: a Key Vault CA integration or a private CA in Azure
# Certificate Manager that issues certificates to App Service / API Management.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca
spec:
  vault:
    # Vault dev server is on the Mac host — reachable from cluster pods
    # via the minikube host gateway alias.
    server: http://vault-host.vault.svc.cluster.local:8200
    # Role restricts issuance to *.aks-lab.local subdomains only.
    path: pki_int/sign/web
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: cert-manager
        serviceAccountRef:
          name: cert-manager
