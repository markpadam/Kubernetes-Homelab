apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-gateway
  namespace: istio-ingress
spec:
  interval: 10m
  dependsOn:
    - name: istiod
      namespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.30.1"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    # ClusterIP, not LoadBalancer — NGINX still owns the host network on :9980.
    # Istio is for east-west and demonstrating the gateway pattern, not for
    # replacing the lab's existing ingress.
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 256Mi
