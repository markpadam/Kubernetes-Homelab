# ─────────────────────────────────────────────────────────────────────────────
#  dns-config.yaml — Source of truth for all DNS zones and records
#
#  This file is the single place to manage DNS for the lab.
#  Running ./IaC/dns/apply-dns-config.sh will apply any changes to the cluster.
#
#  Cluster service IPs (update if services are recreated):
#    mssql.azure-sql             10.105.102.35
#    azurite.azure-storage       10.107.219.75
#    host.minikube.internal      192.168.65.254  (Mac host — Vault runs here)
#
#  For values prefixed with "svc:", apply-dns-config.sh looks up the ClusterIP
#  automatically via kubectl. Run ./IaC/dns/apply-dns-config.sh after new
#  services come up to pick up their IPs.
#
#  record types supported: A, CNAME
# ─────────────────────────────────────────────────────────────────────────────

# Internal corporate zones
# NOTE: corp.internal is now authoritative via SambaAD (Lima VM).
# CoreDNS forwards corp.internal → SambaAD VM IP (set at setup/resume time).
# These records are registered in SambaAD's internal DNS by setup-lab.sh.
# Bind9 no longer serves corp.internal — only privatelink zones below.
internal_zones:

  - zone: corp.internal
    # Records below are managed by SambaAD (samba-tool dns add), not Bind9.
    # The samba-ad VM IP is dynamic (Lima DHCP); captured at setup time.
    records:
      - name: samba-ad        # → SambaAD DC (Lima VM, dynamic IP from Lima)
        type: A
        value: dynamic        # injected by setup-lab.sh via limactl
      - name: sqlserver       # → Azure SQL Edge (mssql.azure-sql, port 1433)
        type: A
        value: svc:mssql/azure-sql
      - name: mydb            # → Azure SQL Edge (same instance, different alias)
        type: A
        value: svc:mssql/azure-sql
      - name: servicebus      # → RabbitMQ AMQP (service-bus ns, port 5672)
        type: A
        value: svc:servicebus/service-bus
      - name: registry        # → Docker Registry (container-registry ns, port 5000)
        type: A
        value: svc:registry/container-registry
      - name: cosmosdb        # → MongoDB (cosmos-db ns, port 27017)
        type: A
        value: svc:cosmosdb/cosmos-db
      # ldap: removed — SambaAD provides real LDAP on its VM IP (port 389)

# Private Link zones — simulates ADDS hosting Azure Private DNS zones
# In production ADDS conditionally forwards these back to Azure DNS (168.63.129.16)
# In the lab bind9 is authoritative with the private endpoint IPs directly
privatelink_zones:

  - zone: privatelink.database.windows.net
    records:
      - name: mysqlserver     # → Azure SQL Edge (mssql.azure-sql, port 1433)
        type: A
        value: 10.105.102.35
      - name: anotherdb       # → Azure SQL Edge (same instance, different DB)
        type: A
        value: 10.105.102.35

  - zone: privatelink.blob.core.windows.net
    records:
      - name: mystorageaccount  # → Azurite blob (azurite.azure-storage, port 10000)
        type: A
        value: 10.107.219.75
      - name: backupstorage     # → Azurite blob (same instance)
        type: A
        value: 10.107.219.75

  - zone: privatelink.vaultcore.azure.net
    records:
      - name: mykeyvault    # → Vault dev server on Mac (host.minikube.internal:8200)
        type: A
        value: 192.168.65.254
      - name: prodkeyvault  # → Vault dev server on Mac (host.minikube.internal:8200)
        type: A
        value: 192.168.65.254

  - zone: privatelink.servicebus.windows.net
    records:
      - name: myservicebus  # → RabbitMQ (service-bus ns, port 5672 AMQP / 5671 AMQPS)
        type: A
        value: svc:servicebus/service-bus
      - name: myeventhub    # → RabbitMQ (same instance — Event Hub shares Service Bus protocol)
        type: A
        value: svc:servicebus/service-bus

  - zone: privatelink.azurecr.io
    records:
      - name: myregistry    # → Docker Registry (container-registry ns, port 5000)
        type: A
        value: svc:registry/container-registry

  - zone: privatelink.documents.azure.com
    records:
      - name: mycosmosdb   # → MongoDB (cosmos-db ns, port 27017)
        type: A
        value: svc:cosmosdb/cosmos-db
      - name: mycosmosdb-eastus  # → MongoDB (secondary-region endpoint pattern)
        type: A
        value: svc:cosmosdb/cosmos-db
