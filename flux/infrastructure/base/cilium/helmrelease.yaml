apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cilium
      version: "1.19.5"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
  values:
    # Minikube + Docker driver: rely on kube-proxy replacement and Cilium's
    # built-in NodePort. Do NOT enable BPF host routing — it requires kernel
    # features the minikube node image may not have.
    kubeProxyReplacement: "false"
    k8sServiceHost: "host.minikube.internal"
    k8sServicePort: 8443
    operator:
      replicas: 1
    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - icmp
          - http
    # Avoid trampling the existing minikube CNI config files on a running
    # cluster — Cilium runs alongside whatever was there until upgrade.
    cni:
      exclusive: false
    ipam:
      mode: kubernetes
