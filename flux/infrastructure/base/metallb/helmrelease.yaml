apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 1h
  chart:
    spec:
      chart: metallb
      version: "0.14.*"
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: metallb-system
      interval: 24h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    controller:
      tolerations: []
    speaker:
      tolerations: []
