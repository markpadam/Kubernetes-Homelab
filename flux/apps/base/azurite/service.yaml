apiVersion: v1
kind: Service
metadata:
  name: azurite
  namespace: azure-storage
spec:
  type: LoadBalancer
  loadBalancerIP: 172.16.3.9
  selector:
    app: azurite
  ports:
    - name: blob
      port: 10000
      targetPort: 10000
    - name: queue
      port: 10001
      targetPort: 10001
    - name: table
      port: 10002
      targetPort: 10002
