# OAuth2 Proxy SSO annotations are added at runtime by lab-feature.sh when
# the oauth2-proxy component is enabled. See flux/infrastructure/base/argocd/ingress.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blob-explorer
  namespace: blob-explorer
  annotations:
    cert-manager.io/cluster-issuer: "lab-ca"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - blob-explorer.aks-lab.local
      secretName: blob-explorer-tls
  rules:
    - host: blob-explorer.aks-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: blob-explorer
                port:
                  number: 80
