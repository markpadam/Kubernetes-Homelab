apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: azdo-agent-pipeline
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Core workload resources (Secrets for Helm release state + chart Secret template)
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims",
                "secrets", "serviceaccounts", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "list"]
  # Apps (Deployments etc.)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Jobs (Helm post-install/post-upgrade hook for DB migration)
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Ingresses and NetworkPolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies", "ingressclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # HPA (autoscaling)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # cert-manager Certificates (TLS for ingress)
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "certificaterequests", "issuers", "clusterissuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: azdo-agent-pipeline
subjects:
  - kind: ServiceAccount
    name: default
    namespace: azdo-agent
roleRef:
  kind: ClusterRole
  name: azdo-agent-pipeline
  apiGroup: rbac.authorization.k8s.io
