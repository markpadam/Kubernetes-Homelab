apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: azdo-agent-pipeline
rules:
  # Namespace management — needed to create/delete per-build test namespaces
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Core workload resources
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Read existing namespaces for health checks / rollout status
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "list"]
  # Flux HelmReleases — lets pipelines deploy GitOps apps (e.g. Bloods) by applying
  # a HelmRelease; Flux's helm-controller then renders the chart and owns the
  # underlying resources, so the agent itself needs no broad workload permissions.
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: azdo-agent-pipeline
subjects:
  - kind: ServiceAccount
    name: default
    namespace: azdo-agent
roleRef:
  kind: ClusterRole
  name: azdo-agent-pipeline
  apiGroup: rbac.authorization.k8s.io
