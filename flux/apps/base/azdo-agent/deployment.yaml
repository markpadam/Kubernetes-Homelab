apiVersion: apps/v1
kind: Deployment
metadata:
  name: azdo-agent
  namespace: azdo-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azdo-agent
  template:
    metadata:
      labels:
        app: azdo-agent
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: agent
          image: azdo-agent:local
          imagePullPolicy: Never
          # Override the start.sh baked into the image with the resilient supervisor
          # from the azdo-agent-start ConfigMap (re-registers + re-runs the listener
          # on flaky-egress failures instead of flapping the agent offline). WORKDIR
          # stays /azp from the image, so the script's relative paths still resolve.
          command: ["bash", "/opt/agent-start/start.sh"]
          env:
            - name: AZP_URL
              valueFrom:
                secretKeyRef:
                  name: azdo-agent-secret
                  key: azp-url
            - name: AZP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: azdo-agent-secret
                  key: azp-token
            - name: AZP_POOL
              valueFrom:
                secretKeyRef:
                  name: azdo-agent-secret
                  key: azp-pool
            # Stable name (NOT the pod name) so pod restarts reconnect to the same
            # agent registration via `config.sh --replace` instead of registering a
            # brand-new agent each time and leaving stale offline agents behind.
            - name: AZP_AGENT_NAME
              value: aks-lab-agent
            - name: AZP_WORK
              value: /azp/work
            - name: STORAGE_DRIVER
              value: overlay
            # Point buildah at the MCR pull-through cache (see azdo-agent-registries).
            - name: CONTAINERS_REGISTRIES_CONF
              value: /opt/agent-registries/registries.conf
            # The Azure Pipelines agent refuses to run as root unless this is set.
            - name: AGENT_ALLOW_RUNASROOT
              value: "1"
          # Run the build agent rootful + privileged. Rootless buildah can't get a
          # usable subuid RANGE in minikube's containerd (newuidmap write is denied),
          # so image layers that chown to non-zero gids (the .NET SDK's /etc/gshadow
          # → gid 42) fail to extract. As root with privileged, buildah chowns
          # directly and uses native overlay — reliable on this dedicated lab box.
          securityContext:
            privileged: true
            runAsUser: 0
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "6"
              memory: 6Gi
          volumeMounts:
            - name: work
              mountPath: /azp/work
            - name: fuse-device
              mountPath: /dev/fuse
            - name: start-script
              mountPath: /opt/agent-start
            - name: registries-conf
              mountPath: /opt/agent-registries
      volumes:
        - name: work
          emptyDir: {}
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
        - name: start-script
          configMap:
            name: azdo-agent-start
            defaultMode: 0755
        - name: registries-conf
          configMap:
            name: azdo-agent-registries
