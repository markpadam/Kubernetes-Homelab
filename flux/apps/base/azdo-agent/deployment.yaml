apiVersion: apps/v1
kind: Deployment
metadata:
  name: azdo-agent
  namespace: azdo-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azdo-agent
  template:
    metadata:
      labels:
        app: azdo-agent
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: agent
          image: azdo-agent:local
          imagePullPolicy: Never
          env:
            - name: AZP_URL
              valueFrom:
                secretKeyRef:
                  name: azdo-agent-secret
                  key: azp-url
            - name: AZP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: azdo-agent-secret
                  key: azp-token
            - name: AZP_POOL
              valueFrom:
                secretKeyRef:
                  name: azdo-agent-secret
                  key: azp-pool
            - name: AZP_AGENT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AZP_WORK
              value: /azp/work
            - name: STORAGE_DRIVER
              value: overlay
          securityContext:
            capabilities:
              add: ["MKNOD"]
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: work
              mountPath: /azp/work
            - name: fuse-device
              mountPath: /dev/fuse
      volumes:
        - name: work
          emptyDir: {}
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
