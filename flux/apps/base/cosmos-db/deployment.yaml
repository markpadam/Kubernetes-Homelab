apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmosdb
  namespace: cosmos-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosmosdb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cosmosdb
    spec:
      # Classic .NET Cosmos emulator (2.x). The vnext-preview image is
      # PostgreSQL-backed and its Postgres build requires AVX2, which this
      # Mac Pro 2013 (Ivy Bridge Xeon) lacks -> SIGILL. The classic emulator
      # runs the Windows engine under a compatibility layer and works here.
      # NOTE: the node has no egress to mcr.microsoft.com, so this image must
      # be pre-loaded:  minikube image load <image> -p aks-lab
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.35
          command: ["sh", "-c", "mkdir -p /tmp/cosmos/appdata && chmod -R 777 /tmp/cosmos/appdata"]
          volumeMounts:
            - name: cosmos-data
              mountPath: /tmp/cosmos/appdata
      containers:
        - name: cosmosdb
          image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:2.14.24
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: gateway
            - containerPort: 10251
              name: direct1
            - containerPort: 10252
              name: direct2
            - containerPort: 10253
              name: direct3
            - containerPort: 10254
              name: direct4
          env:
            # Fewer partitions = lower RAM/startup cost (default is 10).
            - name: AZURE_COSMOS_EMULATOR_PARTITION_COUNT
              value: "3"
            - name: AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE
              value: "true"
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "3Gi"
              cpu: "2000m"
          # Gateway serves HTTPS with a self-signed cert; the kubelet HTTPS
          # probe does not validate the cert. /_explorer/emulator.pem is a
          # cheap 200 once the gateway is up.
          readinessProbe:
            httpGet:
              path: /_explorer/emulator.pem
              port: 8081
              scheme: HTTPS
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /_explorer/emulator.pem
              port: 8081
              scheme: HTTPS
            initialDelaySeconds: 240
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: cosmos-data
              mountPath: /tmp/cosmos/appdata
      volumes:
        - name: cosmos-data
          persistentVolumeClaim:
            claimName: cosmosdb-data
