apiVersion: v1
kind: Secret
metadata:
  name: servicebus-secret
  namespace: service-bus
type: Opaque
stringData:
  # "SAS_KEY_VALUE" is the literal key string accepted by the emulator
  # when UseDevelopmentEmulator=true — not a placeholder, not a real credential
  sas-key: "SAS_KEY_VALUE"
  namespace: "sbemulatorns"
  # In-cluster connection string
  connection-string: "Endpoint=sb://servicebus.service-bus.svc.cluster.local;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
  # localhost connection string (for apps connecting via port-forward)
  connection-string-local: "Endpoint=sb://localhost;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
