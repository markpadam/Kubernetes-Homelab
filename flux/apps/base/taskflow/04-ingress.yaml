# OAuth2 Proxy SSO annotations are added at runtime by lab-feature.sh when
# the oauth2-proxy component is enabled. See flux/infrastructure/base/argocd/ingress.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskapp-ingress
  namespace: taskapp
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: taskflow.aks-lab.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80