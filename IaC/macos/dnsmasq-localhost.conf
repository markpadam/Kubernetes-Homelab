# dnsmasq config for the Mac Pro hosting the aks-lab cluster.
# Resolves *.aks-lab.local to 127.0.0.1 so that minikube tunnel
# (which binds port 443 on loopback) intercepts browser traffic.
# This file is installed by setup-lab.sh.
#
# Distinct from IaC/macos/dnsmasq-aks-lab.conf which is intended for
# LAN clients (MacBook etc.) pointing at the MetalLB ingress IP.

address=/aks-lab.local/127.0.0.1
