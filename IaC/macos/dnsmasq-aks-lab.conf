# dnsmasq config fragment for the aks-lab homelab
#
# Install:
#   brew install dnsmasq
#   sudo cp IaC/macos/dnsmasq-aks-lab.conf /opt/homebrew/etc/dnsmasq.d/aks-lab.conf
#   sudo brew services start dnsmasq
#
# MacBook (one-time, run as root):
#   echo "nameserver 172.16.0.10" > /etc/resolver/aks-lab.local
#   echo "nameserver 172.16.0.10" > /etc/resolver/corp.internal
#
# Subnet layout (172.16.0.0/16):
#   172.16.0.0/24  Management  (Mac Pro @ .10, dnsmasq @ .10)
#   172.16.1.0/24  Clients     (MacBook @ .10)
#   172.16.2.0/24  Multipass VMs (samba-ad @ .10, corp-client @ .11)
#   172.16.3.0/24  MetalLB pool  (Kubernetes LoadBalancer IPs)

# ── Web services ─────────────────────────────────────────────────────────────
# All *.aks-lab.local names resolve to the NGINX Ingress MetalLB IP.
# NGINX routes by Host header to the correct service (Grafana, ArgoCD, etc.).
address=/aks-lab.local/172.16.3.1

# ── Direct service IPs ────────────────────────────────────────────────────────
# Vault runs on the Mac Pro host, not in-cluster.
address=/vault.aks-lab.local/172.16.0.10

# Non-HTTP services with their own MetalLB IPs (for convenience / tooling).
address=/sql.aks-lab.local/172.16.3.3
address=/servicebus.aks-lab.local/172.16.3.4
address=/registry.aks-lab.local/172.16.3.5
address=/cosmos.aks-lab.local/172.16.3.6
address=/azurite.aks-lab.local/172.16.3.9

# ── Active Directory / Samba ─────────────────────────────────────────────────
address=/corp.internal/172.16.2.10
# Forward corp.internal DNS queries to Samba AD for full AD resolution
server=/corp.internal/172.16.2.10
