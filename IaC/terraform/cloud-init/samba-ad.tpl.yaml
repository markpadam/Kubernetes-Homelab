#cloud-config
# Samba 4 Active Directory Domain Controller
# Rendered from samba-ad.tpl.yaml by Terraform — do not edit directly.
#
# Packages are installed during VM boot (parallel with cloud-init init phases),
# then runcmd calls the provisioning script once packages are available.

package_update: true
package_reboot_if_required: false

write_files:
  # Force apt to use IPv4 — Multipass VMs often lack IPv6 routing.
  - path: /etc/apt/apt.conf.d/99force-ipv4
    owner: root:root
    permissions: '0644'
    content: 'Acquire::ForceIPv4 "true";'

  # socat-based IPv4→IPv6 DNS proxy: Samba binds dns[master] to [::]:53 with
  # IPV6_V6ONLY=1 (IPv6-only), so IPv4 DNS queries are refused.  These two
  # services forward UDP/TCP IPv4:53 → ::1:53, making the domain reachable
  # from IPv4-only clients such as the corp-client VM.
  - path: /etc/systemd/system/samba-dns-proxy-udp.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Samba DNS IPv4 UDP proxy
      After=samba-ad-dc.service
      Requires=samba-ad-dc.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/socat UDP4-LISTEN:53,reuseaddr,fork UDP6:[::1]:53
      Restart=on-failure
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/samba-dns-proxy-tcp.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Samba DNS IPv4 TCP proxy
      After=samba-ad-dc.service
      Requires=samba-ad-dc.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/socat TCP4-LISTEN:53,reuseaddr,fork TCP6:[::1]:53
      Restart=on-failure
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

  # All Samba AD provisioning steps in a single script called from runcmd.
  - path: /root/samba-provision.sh
    owner: root:root
    permissions: '0700'
    content: |
      #!/bin/bash
      set -euo pipefail

      # ── Wait for network ───────────────────────────────────────────────────
      # Multipass NAT can take 10-30s to establish after VM boot on macOS —
      # wait before attempting apt-get to avoid a package install failure.
      echo "[samba] Waiting for network connectivity (up to 60s)..."
      _net_ok=false
      for _i in $(seq 1 30); do
        ping -c1 -W2 8.8.8.8 &>/dev/null && _net_ok=true && break || true
        sleep 2
      done
      if ! $_net_ok; then
        echo "[samba] WARNING: no internet after 60s — apt may fail"
      else
        echo "[samba] Network ready"
      fi

      # ── Install packages with retry ────────────────────────────────────────
      # krb5-user is in the universe repo on Ubuntu 24.04.
      # Write the sources file directly — add-apt-repository is not available
      # in the minimal Multipass cloud image without software-properties-common.
      echo "[samba] Enabling universe repository..."
      _rel=$(. /etc/os-release && echo "$VERSION_CODENAME")
      _arch=$(dpkg --print-architecture)
      if [ "$_arch" = "arm64" ]; then
        _mirror="http://ports.ubuntu.com/ubuntu-ports"
      else
        _mirror="http://archive.ubuntu.com/ubuntu"
      fi
      printf 'deb %s %s universe\ndeb %s %s-updates universe\n' \
        "$_mirror" "$_rel" "$_mirror" "$_rel-updates" \
        > /etc/apt/sources.list.d/lab-universe.list

      echo "[samba] Installing packages..."
      _pkg_ok=false
      for _attempt in 1 2 3; do
        apt-get update -qq 2>&1 | tail -1 || true
        if apt-get install -y --no-install-recommends \
            samba winbind krb5-user attr dnsutils ldap-utils acl socat; then
          _pkg_ok=true
          break
        fi
        echo "[samba] Package install failed (attempt $_attempt/3) — retrying in 15s..."
        sleep 15
      done
      $_pkg_ok || { echo "[samba] ERROR: packages could not be installed after 3 attempts"; exit 1; }
      echo "[samba] Packages installed"

      echo "[samba] Stopping default Samba services..."
      systemctl stop smbd nmbd winbind 2>/dev/null || true
      systemctl disable smbd nmbd winbind 2>/dev/null || true

      echo "[samba] Removing default Samba config..."
      mv /etc/samba/smb.conf /etc/samba/smb.conf.bak 2>/dev/null || true

      echo "[samba] Provisioning domain ${ad_domain} ..."
      samba-tool domain provision \
        --domain="${ad_domain_netbios}" \
        --realm="${ad_domain}" \
        --adminpass="${ad_admin_password}" \
        --dns-backend=SAMBA_INTERNAL \
        --server-role=dc \
        --use-rfc2307

      echo "[samba] Configuring DNS forwarder..."
      grep -q 'dns forwarder' /etc/samba/smb.conf \
        || sed -i '/\[global\]/a \tdns forwarder = 8.8.8.8' /etc/samba/smb.conf

      echo "[samba] Allowing plain LDAP binds (no TLS required)..."
      grep -q 'ldap server require strong auth' /etc/samba/smb.conf \
        || sed -i 's/^\[global\]$/[global]\n\tldap server require strong auth = no/' /etc/samba/smb.conf

      echo "[samba] Configuring Kerberos..."
      cp /var/lib/samba/private/krb5.conf /etc/krb5.conf

      echo "[samba] Starting samba-ad-dc..."
      systemctl unmask samba-ad-dc
      systemctl enable samba-ad-dc
      systemctl start samba-ad-dc

      echo "[samba] Waiting for LDAP to be ready..."
      for i in $(seq 1 30); do
        samba-tool domain info 127.0.0.1 2>/dev/null \
          && echo "[samba] Domain ready after $i attempts" && break
        sleep 2
      done

      echo "[samba] Creating lab OU and users..."
      samba-tool ou create "OU=lab-users,${dc_path}" 2>/dev/null || true
      samba-tool user create testuser1 "${ad_test_user1_pass}" \
        --userou="OU=lab-users" \
        --given-name="Test" --surname="User One" 2>/dev/null || true
      samba-tool user create testuser2 "${ad_test_user2_pass}" \
        --userou="OU=lab-users" \
        --given-name="Test" --surname="User Two" 2>/dev/null || true
      samba-tool group add lab-users 2>/dev/null || true
      samba-tool group addmembers lab-users testuser1,testuser2 2>/dev/null || true

      echo "[samba] Starting DNS IPv4 proxy (socat)..."
      systemctl daemon-reload
      systemctl enable --now samba-dns-proxy-udp samba-dns-proxy-tcp

      echo "[samba] Provisioning complete."

runcmd:
  - [bash, /root/samba-provision.sh]
