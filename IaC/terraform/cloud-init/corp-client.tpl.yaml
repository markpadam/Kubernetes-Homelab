#cloud-config
# Corp Client VM — Ubuntu 24.04 domain-joined workstation with XFCE4 + VNC
# Rendered from corp-client.tpl.yaml by Terraform — do not edit directly.
#
# SAMBA_IP_PLACEHOLDER is substituted at apply time by the provisioner once
# the samba-ad VM IP is known. All other variables are rendered by Terraform.

write_files:
  - path: /etc/apt/apt.conf.d/99force-ipv4
    owner: root:root
    content: 'Acquire::ForceIPv4 "true";'

  - path: /etc/systemd/system/vncserver@.service
    owner: root:root
    content: |
      [Unit]
      Description=TigerVNC server for display %i
      After=syslog.target network.target

      [Service]
      Type=forking
      User=ubuntu
      Group=ubuntu
      WorkingDirectory=/home/ubuntu
      ExecStartPre=-/usr/bin/vncserver -kill :%i
      ExecStart=/usr/bin/vncserver -localhost no -geometry 1280x800 -depth 24 :%i
      ExecStop=/usr/bin/vncserver -kill :%i
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target

  - path: /root/install-extras.sh
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      echo "[extras] Adding Mozilla apt repo (Firefox without snap)..."
      wget -qO - https://packages.mozilla.org/apt/repo-signing-key.gpg \
        | gpg --dearmor > /etc/apt/trusted.gpg.d/packages.mozilla.org.gpg
      echo "deb [signed-by=/etc/apt/trusted.gpg.d/packages.mozilla.org.gpg] https://packages.mozilla.org/apt mozilla main" \
        > /etc/apt/sources.list.d/mozilla.list
      printf 'Package: firefox*\nPin: origin packages.mozilla.org\nPin-Priority: 1000\n' \
        > /etc/apt/preferences.d/mozilla-firefox

      echo "[extras] Adding Sublime Text apt repo..."
      wget -qO - https://download.sublimetext.com/sublimehq-pub.gpg \
        | gpg --dearmor > /etc/apt/trusted.gpg.d/sublimehq-archive.gpg
      echo "deb https://download.sublimetext.com/ apt/stable/" \
        > /etc/apt/sources.list.d/sublime-text.list

      echo "[extras] Installing Firefox and Sublime Text..."
      apt-get update -qq
      DEBIAN_FRONTEND=noninteractive apt-get install -y firefox sublime-text
      echo "[extras] Extra packages installed."

  - path: /root/install-k8s-tools.sh
    owner: root:root
    content: |
      #!/bin/bash
      # Install the Kubernetes / GitOps CLI toolchain on the corp-client VM
      # so domain users can drive the lab from inside the VM.
      #
      # Installed:
      #   kubectl   — pkgs.k8s.io apt repo
      #   helm      — baltocdn helm apt repo
      #   flux      — official fluxcd.io install script
      #   vault     — HashiCorp apt repo
      #   argocd    — github release binary
      #   k9s       — github release .deb
      #   jq, yq    — JSON / YAML processing
      #
      # No kubeconfig is set up here — that needs to be copied in by the user
      # (e.g. multipass transfer ~/.kube/config corp-client:/home/ubuntu/.kube/config)
      # because the cluster API lives on the Mac host and the server URL has
      # to be rewritten to the corp-client's view of the host.
      set -euo pipefail

      # Multipass inherits the host architecture. Detect once so we pick the
      # right binary on both Apple Silicon (arm64) and Intel (amd64) Macs.
      ARCH=$(dpkg --print-architecture)   # arm64 | amd64
      case "$ARCH" in
        arm64) GH_ARCH=arm64 ;;
        amd64) GH_ARCH=amd64 ;;
        *)     echo "[k8s-tools] Unsupported architecture: $ARCH"; exit 1 ;;
      esac
      echo "[k8s-tools] Detected architecture: $ARCH"

      # ── kubectl (apt) ─────────────────────────────────────────────
      echo "[k8s-tools] Adding Kubernetes apt repo..."
      mkdir -p -m 755 /etc/apt/keyrings
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key \
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      chmod 644 /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /" \
        > /etc/apt/sources.list.d/kubernetes.list

      # ── helm (apt) ────────────────────────────────────────────────
      echo "[k8s-tools] Adding Helm apt repo..."
      curl -fsSL https://baltocdn.com/helm/signing.asc \
        | gpg --dearmor -o /etc/apt/keyrings/helm.gpg
      chmod 644 /etc/apt/keyrings/helm.gpg
      echo "deb [arch=$ARCH signed-by=/etc/apt/keyrings/helm.gpg] https://baltocdn.com/helm/stable/debian/ all main" \
        > /etc/apt/sources.list.d/helm-stable-debian.list

      # ── HashiCorp Vault (apt) ─────────────────────────────────────
      echo "[k8s-tools] Adding HashiCorp apt repo..."
      curl -fsSL https://apt.releases.hashicorp.com/gpg \
        | gpg --dearmor -o /etc/apt/keyrings/hashicorp.gpg
      chmod 644 /etc/apt/keyrings/hashicorp.gpg
      UBUNTU_CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")
      echo "deb [arch=$ARCH signed-by=/etc/apt/keyrings/hashicorp.gpg] https://apt.releases.hashicorp.com $UBUNTU_CODENAME main" \
        > /etc/apt/sources.list.d/hashicorp.list

      echo "[k8s-tools] Installing kubectl, helm, vault, jq from apt..."
      apt-get update -qq
      DEBIAN_FRONTEND=noninteractive apt-get install -y kubectl helm vault jq

      # ── flux (curl installer — drops binary in /usr/local/bin) ───
      echo "[k8s-tools] Installing flux..."
      curl -fsSL https://fluxcd.io/install.sh | bash >/dev/null

      # ── argocd CLI (GitHub release) ───────────────────────────────
      echo "[k8s-tools] Installing argocd CLI..."
      ARGOCD_VERSION=$(curl -fsSL https://api.github.com/repos/argoproj/argo-cd/releases/latest \
        | grep '"tag_name"' | head -1 | cut -d'"' -f4)
      curl -fsSL "https://github.com/argoproj/argo-cd/releases/download/$${ARGOCD_VERSION}/argocd-linux-$${GH_ARCH}" \
        -o /usr/local/bin/argocd
      chmod +x /usr/local/bin/argocd

      # ── k9s (GitHub release .deb) ─────────────────────────────────
      echo "[k8s-tools] Installing k9s..."
      K9S_VERSION=$(curl -fsSL https://api.github.com/repos/derailed/k9s/releases/latest \
        | grep '"tag_name"' | head -1 | cut -d'"' -f4)
      curl -fsSL "https://github.com/derailed/k9s/releases/download/$${K9S_VERSION}/k9s_linux_$${GH_ARCH}.deb" \
        -o /tmp/k9s.deb
      DEBIAN_FRONTEND=noninteractive dpkg -i /tmp/k9s.deb || apt-get -f install -y
      rm -f /tmp/k9s.deb

      # ── yq (GitHub release binary) ────────────────────────────────
      echo "[k8s-tools] Installing yq..."
      curl -fsSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_$${GH_ARCH}" \
        -o /usr/local/bin/yq
      chmod +x /usr/local/bin/yq

      # ── Shell completion + aliases for the ubuntu user ────────────
      echo "[k8s-tools] Adding shell completion and aliases..."
      cat >> /home/ubuntu/.bashrc <<'BASHRC'

      # AKS lab CLI completions and aliases
      command -v kubectl &>/dev/null && source <(kubectl completion bash) && alias k=kubectl && complete -o default -F __start_kubectl k
      command -v helm    &>/dev/null && source <(helm completion bash)
      command -v flux    &>/dev/null && source <(flux completion bash)
      command -v argocd  &>/dev/null && source <(argocd completion bash)
      BASHRC
      chown ubuntu:ubuntu /home/ubuntu/.bashrc

      echo "[k8s-tools] Tool versions:"
      kubectl version --client 2>/dev/null | head -1 || true
      helm version --short 2>/dev/null      || true
      flux --version 2>/dev/null            || true
      vault version 2>/dev/null             || true
      argocd version --client --short 2>/dev/null || true
      k9s version --short 2>/dev/null       || true
      yq --version 2>/dev/null              || true
      jq --version 2>/dev/null              || true

      echo "[k8s-tools] Install complete."

  - path: /root/client-setup.sh
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      SAMBA_IP="SAMBA_IP_PLACEHOLDER"
      DOMAIN="${ad_domain}"

      echo "[client] Configuring DNS to use SambaAD ($SAMBA_IP)..."
      # Stop resolved with a timeout so a slow shutdown can't block this script.
      timeout 15 systemctl stop systemd-resolved 2>/dev/null || true
      systemctl mask systemd-resolved 2>/dev/null || true
      rm -f /etc/resolv.conf
      printf 'nameserver %s\nsearch %s\ndomain %s\n' \
        "$SAMBA_IP" "$DOMAIN" "$DOMAIN" > /etc/resolv.conf
      chattr +i /etc/resolv.conf

      echo "[client] Verifying DNS to domain..."
      for i in $(seq 1 15); do
        nslookup "$DOMAIN" 2>/dev/null && echo "[client] DNS OK after $i attempts" && break
        sleep 2
      done

      echo "[client] Discovering realm..."
      realm discover "$DOMAIN"

      echo "[client] Joining domain $DOMAIN..."
      printf '%s\n' '${ad_admin_password}' | realm join "$DOMAIN" -U Administrator --verbose

      echo "[client] Enabling home directory creation on login..."
      pam-auth-update --enable mkhomedir --force

      echo "[client] Configuring SSSD to allow short usernames..."
      sed -i 's/^use_fully_qualified_names.*/use_fully_qualified_names = False/' /etc/sssd/sssd.conf || true
      systemctl restart sssd

      echo "[client] Verifying domain join..."
      for i in $(seq 1 10); do
        id testuser1 2>/dev/null && echo "[client] Domain join verified — testuser1 resolves" && break
        sleep 3
      done

      echo "[client] Granting sudo/wheel access to domain admins and lab users..."
      # Domain Admins group → full sudo (Cockpit admin access).
      # printf avoids heredoc << syntax which is invalid inside YAML block scalars.
      printf '%s\n' '%domain\ admins ALL=(ALL) ALL' \
        > /etc/sudoers.d/domain-admins
      chmod 440 /etc/sudoers.d/domain-admins

      # Individual lab users → passwordless sudo for convenience
      printf '%s\n' \
        'testuser1 ALL=(ALL) NOPASSWD: ALL' \
        'testuser2 ALL=(ALL) NOPASSWD: ALL' \
        > /etc/sudoers.d/lab-users
      chmod 440 /etc/sudoers.d/lab-users

      # Cockpit on Ubuntu checks the 'sudo' group for admin badge —
      # create a wheel group and wire it to sudoers.
      groupadd -f wheel
      printf '%s\n' '%wheel ALL=(ALL) ALL' \
        > /etc/sudoers.d/wheel
      chmod 440 /etc/sudoers.d/wheel
      echo "[client] Sudo/wheel access configured"

      echo "[client] Adding cluster service host entries..."
      GATEWAY_IP=$(ip route | grep default | awk '{print $3}')
      printf '\n# AKS lab cluster services (via Mac host port-forwards)\n' >> /etc/hosts
      for svc in taskflow grafana argocd blob-explorer oauth2-proxy dex; do
        printf '%s  %s.aks-lab.local\n' "$GATEWAY_IP" "$svc" >> /etc/hosts
      done

      echo "[client] Setting up XFCE4 VNC desktop..."
      mkdir -p /home/ubuntu/.vnc
      chmod 700 /home/ubuntu/.vnc
      chown ubuntu:ubuntu /home/ubuntu/.vnc

      printf '#!/bin/bash\nunset SESSION_MANAGER\nunset DBUS_SESSION_BUS_ADDRESS\nexec startxfce4\n' \
        > /home/ubuntu/.vnc/xstartup
      chmod +x /home/ubuntu/.vnc/xstartup
      chown ubuntu:ubuntu /home/ubuntu/.vnc/xstartup

      printf '%s\n' '${vnc_password}' \
        | sudo -u ubuntu vncpasswd -f > /home/ubuntu/.vnc/passwd
      chmod 600 /home/ubuntu/.vnc/passwd
      chown ubuntu:ubuntu /home/ubuntu/.vnc/passwd

      systemctl daemon-reload
      systemctl enable vncserver@1
      systemctl start vncserver@1

      echo "[client] Enabling Cockpit web console (port 9090)..."
      systemctl enable --now cockpit.socket
      # Allow cockpit through ufw if active
      ufw allow 9090/tcp 2>/dev/null || true
      CLIENT_IP=$(hostname -I | awk '{print $1}')
      echo "[client] Cockpit ready — https://$CLIENT_IP:9090  (login: ubuntu / domain creds)"

      echo "[client] Client provisioning complete."

runcmd:
  # krb5-user, xfce4 etc. are in universe on Ubuntu 24.04 — enable it first.
  # Write the sources file directly; add-apt-repository is not available in the
  # minimal cloud image without software-properties-common.
  - |
    echo "[client] Enabling universe repository..."
    _rel=$(. /etc/os-release && echo "$VERSION_CODENAME")
    _arch=$(dpkg --print-architecture)
    if [ "$_arch" = "arm64" ]; then
      _mirror="http://ports.ubuntu.com/ubuntu-ports"
    else
      _mirror="http://archive.ubuntu.com/ubuntu"
    fi
    printf 'deb %s %s universe\ndeb %s %s-updates universe\n' \
      "$_mirror" "$_rel" "$_mirror" "$_rel-updates" \
      > /etc/apt/sources.list.d/lab-universe.list
    echo "[client] Installing packages..."
    _pkg_ok=false
    for _attempt in 1 2 3; do
      apt-get update -qq 2>&1 | tail -1 || true
      if DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          realmd sssd sssd-tools adcli ldap-utils \
          curl wget dnsutils net-tools \
          xfce4 xfce4-goodies xfce4-terminal thunar \
          tigervnc-standalone-server dbus-x11 \
          cockpit cockpit-packagekit; then
        _pkg_ok=true
        break
      fi
      echo "[client] Package install failed (attempt $_attempt/3) — retrying in 15s..."
      sleep 15
    done
    $_pkg_ok || { echo "[client] ERROR: packages could not be installed after 3 attempts"; exit 1; }
    echo "[client] Packages installed"
  - bash /root/install-extras.sh
  - bash /root/install-k8s-tools.sh
  - bash /root/client-setup.sh
