# ── Phase 7 / Step 3: Three-Tier UI RBAC ─────────────────────────────────────
#
# Three personas mirroring the POC's RBAC model:
#
#   Persona   | Precedence | Workflows          | Templates/Crons  | Logs
#   ──────────────────────────────────────────────────────────────────────────
#   Admin     | 100        | Full CRUD          | Full CRUD        | ✅
#   Operator  |  50        | View + Submit      | Read-only        | ✅
#   Viewer    |   0        | Read-only          | Read-only        | ✅
#
# POC uses Azure SSO + rbac-rule annotations keyed on Azure group IDs.
# Lab uses --auth-mode=client + SA bearer tokens — same RBAC Roles, different
# identity source. The Role/RoleBinding definitions are identical to production.
#
# How --auth-mode=client works:
#   User pastes their SA token into the Argo UI login screen.
#   Argo makes all K8s API calls as that SA, so the SA's RoleBindings decide
#   what the user can see and do. No rbac-rule evaluation — pure K8s RBAC.
#
# STEP A — Switch Argo server to client auth mode:
#   kubectl patch deployment argo-server -n argo --type=json -p='[
#     {"op":"replace","path":"/spec/template/spec/containers/0/args/0","value":"server"},
#     {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--auth-mode=client"},
#     {"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--secure=false"}
#   ]'
#
#   NOTE: If the above fails due to existing args order, check current args first:
#   kubectl get deployment argo-server -n argo -o jsonpath='{.spec.template.spec.containers[0].args}'
#   Then patch by index accordingly.
#
# STEP B — Apply this file:
#   kubectl apply -f 03-ui-rbac.yaml
#
# STEP C — Get the three tokens and log in with each to see the permission difference:
#   # Admin token
#   kubectl get secret lab-ui-admin-token -n argo -o jsonpath='{.data.token}' | base64 -d
#
#   # Operator token
#   kubectl get secret lab-ui-operator-token -n argo -o jsonpath='{.data.token}' | base64 -d
#
#   # Viewer token
#   kubectl get secret lab-ui-viewer-token -n argo -o jsonpath='{.data.token}' | base64 -d
#
# Open http://argo-workflows.aks-lab.local:2746 → paste each token → observe
# what buttons and actions are available.
#
# ── Azure SSO comparison ──────────────────────────────────────────────────────
# In AKS with SSO the rbac-rule annotation replaces the manual token login:
#
#   annotations:
#     workflows.argoproj.io/rbac-rule: "'<azure-group-id>' in groups"
#     workflows.argoproj.io/rbac-rule-precedence: "100"
#
# Argo evaluates this against the OIDC claims from Azure Entra ID.
# The Role/RoleBinding definitions below are IDENTICAL to production —
# only the identity source changes (SA token vs Azure group).
# ─────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# ADMIN (L3) — Full CRUD on all Argo resources
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-ui-admin
  namespace: argo
  annotations:
    # In production (SSO mode) this controls which Azure group gets Admin access.
    # Not evaluated in --auth-mode=client but kept for documentation.
    workflows.argoproj.io/rbac-rule: "'lab-admins' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "100"
  labels:
    app: lab-ui-rbac
    persona: admin
automountServiceAccountToken: false

---
# Static token — stable across pod restarts, used to log into the Argo UI.
apiVersion: v1
kind: Secret
metadata:
  name: lab-ui-admin-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: lab-ui-admin
  labels:
    app: lab-ui-rbac
    persona: admin
type: kubernetes.io/service-account-token

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-ui-admin
  namespace: argo
  labels:
    app: lab-ui-rbac
    persona: admin
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]

  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates", "cronworkflows"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults", "workflowtasksets", "workflowartifactgctasks"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-ui-admin
  namespace: argo
  labels:
    app: lab-ui-rbac
    persona: admin
subjects:
  - kind: ServiceAccount
    name: lab-ui-admin
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab-ui-admin

---
# ══════════════════════════════════════════════════════════════════════════════
# OPERATOR (L2) — View + Submit workflows; read-only on templates and crons
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-ui-operator
  namespace: argo
  annotations:
    workflows.argoproj.io/rbac-rule: "'lab-operators' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "50"
  labels:
    app: lab-ui-rbac
    persona: operator
automountServiceAccountToken: false

---
apiVersion: v1
kind: Secret
metadata:
  name: lab-ui-operator-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: lab-ui-operator
  labels:
    app: lab-ui-rbac
    persona: operator
type: kubernetes.io/service-account-token

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-ui-operator
  namespace: argo
  labels:
    app: lab-ui-rbac
    persona: operator
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch", "create"]   # can submit, cannot edit/delete

  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates", "cronworkflows"]
    verbs: ["get", "list", "watch"]              # read-only

  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults", "workflowtasksets", "workflowartifactgctasks"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-ui-operator
  namespace: argo
  labels:
    app: lab-ui-rbac
    persona: operator
subjects:
  - kind: ServiceAccount
    name: lab-ui-operator
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab-ui-operator

---
# ══════════════════════════════════════════════════════════════════════════════
# VIEWER (L1) — Read-only across all Argo resources
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-ui-viewer
  namespace: argo
  annotations:
    workflows.argoproj.io/rbac-rule: "'lab-viewers' in groups"
    workflows.argoproj.io/rbac-rule-precedence: "0"
  labels:
    app: lab-ui-rbac
    persona: viewer
automountServiceAccountToken: false

---
apiVersion: v1
kind: Secret
metadata:
  name: lab-ui-viewer-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: lab-ui-viewer
  labels:
    app: lab-ui-rbac
    persona: viewer
type: kubernetes.io/service-account-token

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-ui-viewer
  namespace: argo
  labels:
    app: lab-ui-rbac
    persona: viewer
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "workflowtemplates", "cronworkflows"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults", "workflowtasksets", "workflowartifactgctasks"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-ui-viewer
  namespace: argo
  labels:
    app: lab-ui-rbac
    persona: viewer
subjects:
  - kind: ServiceAccount
    name: lab-ui-viewer
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab-ui-viewer
