# exam-sim tmux config
set -g status-bg colour235
set -g status-fg colour250
set -g status-left  "#[fg=colour39,bold] exam-sim #[fg=colour250]│ "
set -g status-right "#[fg=colour39]ctx: #(kubectl config current-context 2>/dev/null || echo none) #[fg=colour250]│ %H:%M "
set -g status-right-length 60
set -g status-interval 5

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Mouse support
set -g mouse on

# Increase history
set -g history-limit 10000
