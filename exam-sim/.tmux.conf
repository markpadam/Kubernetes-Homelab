# Exam-sim tmux config — mirrors PSI exam environment defaults.
# Install: cp exam-sim/.tmux.conf ~/.tmux.conf  (or run exam-sim/setup.sh)

# Faster key repeat — critical in the exam for Esc in vim
set -s escape-time 0

# Increase scrollback
set -g history-limit 10000

# Use Ctrl-a as prefix (same as the exam environment default)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes with | and - (intuitive, exam uses these too)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Navigate panes with Alt+arrow (no prefix needed — faster)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes with prefix + arrow
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 5
bind -r Down  resize-pane -D 5

# Mouse OFF — the exam terminal does not support mouse; practice without it
set -g mouse off

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# 256 colour support
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Status bar — minimal, exam-like
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1a2e,fg=#a0a0b0"

set -g status-left-length 30
set -g status-left "#[bg=#2a3a6a,fg=#ffffff,bold] #S #[default] "

set -g status-right-length 50
set -g status-right "#[fg=#606070]%H:%M  #[fg=#4a7a4a]#{?window_zoomed_flag,[ZOOM] ,}#[fg=#606070]#H"

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[bg=#2a3a6a,fg=#ffffff,bold] #I:#W #[default]"

# Pane borders — subtle
set -g pane-border-style        "fg=#303040"
set -g pane-active-border-style "fg=#4a6aa0"

# Vi mode for copy — use v to select, y to yank
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# Enter copy mode with prefix+[, paste with prefix+]
bind [ copy-mode
bind ] paste-buffer
