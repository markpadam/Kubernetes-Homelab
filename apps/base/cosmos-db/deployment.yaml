apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmosdb
  namespace: cosmos-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosmosdb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cosmosdb
    spec:
      # The internal health_check_server checks the gateway via the hostname in
      # GATEWAY_PUBLIC_ENDPOINT. In minikube (Docker driver) a pod cannot reach
      # its own ClusterIP (no hairpin NAT), so the check always fails. Mapping
      # the service hostname to 127.0.0.1 in /etc/hosts makes the health_check_server
      # connect to localhost where the gateway IS reachable, without altering the
      # GATEWAY_PUBLIC_ENDPOINT value used in the gateway's own API responses.
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - "cosmosdb.cosmos-db.svc.cluster.local"
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.35
          command: ["sh", "-c", "chmod 777 /usr/cosmos/data"]
          volumeMounts:
            - name: cosmos-data
              mountPath: /usr/cosmos/data
      containers:
        - name: cosmosdb
          image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
          ports:
            - containerPort: 8081
              name: nosql
            - containerPort: 8080
              name: health
            - containerPort: 1234
              name: explorer
          env:
            - name: PROTOCOL
              value: "http"
            - name: GATEWAY_PUBLIC_ENDPOINT
              value: "cosmosdb.cosmos-db.svc.cluster.local"
            - name: DATA_PATH
              value: "/usr/cosmos/data"
            - name: ENABLE_TELEMETRY
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 10
          volumeMounts:
            - name: cosmos-data
              mountPath: /usr/cosmos/data
      volumes:
        - name: cosmos-data
          persistentVolumeClaim:
            claimName: cosmosdb-data
