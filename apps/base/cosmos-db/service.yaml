apiVersion: v1
kind: Service
metadata:
  name: cosmosdb
  namespace: cosmos-db
spec:
  selector:
    app: cosmosdb
  ports:
    - name: nosql
      port: 8081
      targetPort: 8081
    - name: health
      port: 8080
      targetPort: 8080
    - name: explorer
      port: 1234
      targetPort: 1234
