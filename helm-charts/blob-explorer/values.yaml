replicaCount: 1

image:
  repository: aks-lab/blob-explorer
  tag: latest
  # Never = use the image built into Minikube's Docker daemon (no registry needed)
  # Change to IfNotPresent when pulling from a real registry in production
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

azureStorage:
  # Azurite's fixed well-known connection string — safe to commit, these are not real credentials.
  # In production, override connectionString with your real Azure Storage account connection string.
  connectionString: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OtLdTWBP4y6bW8hGo1E/GkHUFAf4fRHtPIJCRflFiX+BPxP4lSM5A==;BlobEndpoint=http://azurite.azure-storage.svc.cluster.local:10000/devstoreaccount1;"
