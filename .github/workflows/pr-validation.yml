name: PR Lab Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Only one lab deploy at a time — queue rather than cancel so no PR is skipped.
concurrency:
  group: lab-deploy
  cancel-in-progress: false

jobs:
  validate:
    # Public repo + self-hosted runner: never run fork PRs — they would execute
    # arbitrary workflow/script changes on the lab Mac. Same-repo branches only.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      LAB_PROFILE: ci-lab
      LAB_RESOURCE_TIER: "1"
      GITHUB_TOKEN: ${{ secrets.FLUX_GITHUB_TOKEN }}
      # Point Flux at the PR's head ref so we validate the PR, not upstream main.
      GITHUB_REPO: ${{ github.event.pull_request.head.repo.clone_url }}
      GITHUB_BRANCH: ${{ github.event.pull_request.head.ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Teardown any existing CI lab
        run: ./aks-lab teardown
        continue-on-error: true

      - name: Deploy lab (minimal preset)
        run: ./aks-lab setup --minimal --ci

      - name: Smoke tests
        run: .github/scripts/smoke-test.sh

      - name: Teardown CI lab
        if: always()
        run: ./aks-lab teardown
