# ── Phase 3: Parameters + conditional steps ───────────────────────────────────
#
# Concepts covered:
#   - Workflow-level arguments  — inputs you set when submitting (visible in the UI)
#   - `when`                    — conditionally skip a step based on a parameter value
#   - WorkflowTemplate pattern  — this mirrors exactly how the production POC works:
#       the CronWorkflow passes runHoliday/runFutureMonthlyExpiry/runForwardMonthlyExpiry
#       as booleans, and each step only runs when its flag is "true"
#
# Submit with default values:
#   kubectl apply -f 02-parameters.yaml
#
# Submit with custom values (CLI):
#   argo submit -n argo 02-parameters.yaml \
#     -p run-task-a=false \
#     -p run-task-b=true
#
# Submit via UI → you'll see sliders/inputs for each parameter before submitting.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: parameters-demo-
  namespace: argo
spec:
  entrypoint: main

  # Workflow-level arguments — these are the inputs to the whole workflow.
  # In the POC these are: runHoliday, runFutureMonthlyExpiry, runForwardMonthlyExpiry
  arguments:
    parameters:
      - name: run-task-a
        value: "true"              # default; override at submit time
      - name: run-task-b
        value: "true"
      - name: run-task-c
        value: "false"             # disabled by default — shows conditional skipping

  templates:

    - name: main
      inputs:
        parameters:
          - name: run-task-a
          - name: run-task-b
          - name: run-task-c
      steps:
        # All three steps are in the same stage so they run in parallel.
        # The `when` clause skips a step entirely if the condition is false —
        # no pod is created, the step shows as "Skipped" in the UI.
        - - name: task-a
            template: run-task
            when: "'{{inputs.parameters.run-task-a}}' == 'true'"
            arguments:
              parameters:
                - name: task-name
                  value: "task-a"
                - name: duration
                  value: "3"

          - name: task-b
            template: run-task
            when: "'{{inputs.parameters.run-task-b}}' == 'true'"
            arguments:
              parameters:
                - name: task-name
                  value: "task-b"
                - name: duration
                  value: "5"

          - name: task-c
            template: run-task
            when: "'{{inputs.parameters.run-task-c}}' == 'true'"
            arguments:
              parameters:
                - name: task-name
                  value: "task-c"
                - name: duration
                  value: "4"

        # This step only runs after all stage-1 steps complete (or are skipped).
        - - name: summary
            template: run-task
            arguments:
              parameters:
                - name: task-name
                  value: "summary"
                - name: duration
                  value: "1"

    - name: run-task
      inputs:
        parameters:
          - name: task-name
          - name: duration
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            echo "=== Starting {{inputs.parameters.task-name}} ==="
            echo "Simulating work for {{inputs.parameters.duration}}s..."
            sleep {{inputs.parameters.duration}}
            echo "=== {{inputs.parameters.task-name}} complete ==="
