# ── Phase 6: Secrets + RBAC ───────────────────────────────────────────────────
#
# Concepts covered:
#   - Vault as secret store   — simulates Azure Key Vault in the lab
#   - K8s Secret              — the bridge between Vault and pods (secretKeyRef)
#   - ESO                     — what automates the Vault → K8s Secret sync in production
#   - ServiceAccount          — identity the workflow pods run as (mirrors POC's calendar-uploader)
#   - workflowtaskresults     — the ONE permission workflow pods actually need
#   - UI RBAC (rbac-rule)     — separate from pod RBAC; how human users are scoped in the UI
#
# Azure Key Vault → Lab Vault mapping:
#   AKS: AKV secret → ESO ExternalSecret → K8s Secret → pod secretKeyRef
#   Lab: Vault KV  → (manual or ESO)    → K8s Secret → pod secretKeyRef
#   The pod spec is IDENTICAL in both — only the sync mechanism differs.
#
# ─── STEP 1: Store secrets in Vault ──────────────────────────────────────────
# Run these on your Mac (vault CLI talks to the dev server at :8200):
#
#   export VAULT_ADDR=http://127.0.0.1:8200
#   export VAULT_TOKEN=root
#
#   vault kv put kv/lab/report-runner \
#     username=lab-user \
#     password=sup3r-s3cr3t \
#     endpoint=http://taskflow.aks-lab.local:8081
#
#   # Verify:
#   vault kv get kv/lab/report-runner
#
# ─── STEP 2: Sync Vault → K8s Secret ─────────────────────────────────────────
# In production ESO does this automatically. For the lab we do it manually once:
#
#   kubectl create secret generic lab-report-secrets -n argo \
#     --from-literal=username=$(vault kv get -field=username kv/lab/report-runner) \
#     --from-literal=password=$(vault kv get -field=password kv/lab/report-runner) \
#     --from-literal=endpoint=$(vault kv get -field=endpoint kv/lab/report-runner) \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   # Verify:
#   kubectl get secret lab-report-secrets -n argo
#
# ─── STEP 3: Apply this file ─────────────────────────────────────────────────
#   kubectl apply -f 05-secrets-rbac.yaml
#
# ─── STEP 4: Submit a run ────────────────────────────────────────────────────
#   argo submit -n argo --from workflowtemplate/lab-report-runner -p run-summary=true
#   argo watch -n argo @latest
#   argo logs  -n argo @latest   # look for the "Credentials loaded" line
#
# ─── About ESO (External Secrets Operator) ───────────────────────────────────
# ESO replaces the manual Step 2 above. It watches ExternalSecret resources and
# continuously syncs Vault KV → K8s Secret. Install it with:
#
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# Then you'd create:
#   SecretStore    — points to Vault, authenticates via Kubernetes auth backend
#   ExternalSecret — declares which Vault keys map to which K8s Secret keys
#
# This is Phase 7 material if you want to automate the sync end-to-end.
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. ServiceAccount ─────────────────────────────────────────────────────────
# Workflow pods run as this identity, not as the default SA.
# In AKS this SA would have a Workload Identity binding to a managed identity.
# In the lab it's plain — Vault auth happens at the sync layer, not here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lab-report-sa
  namespace: argo
  labels:
    app: lab-demo
    managed-by: argo-workflows

---
# ── 2. Role ───────────────────────────────────────────────────────────────────
# This is the ONLY permission the workflow pod SA needs in Argo v3.4+.
# workflowtaskresults is how each pod reports its step result back to the
# controller. Without this the workflow hangs waiting for results.
# (This mirrors the POC's calendar-uploader-wftaskresults Role exactly.)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: lab-report-sa-wftaskresults
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]

---
# ── 3. RoleBinding ────────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lab-report-sa-wftaskresults
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: lab-report-sa
    namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: lab-report-sa-wftaskresults

---
# ── 4. WorkflowTemplate (updated lab-report-runner) ──────────────────────────
# kubectl apply replaces the existing one in-place.
# Changes from Phase 4:
#   + serviceAccountName  — pods run as lab-report-sa, not the default SA
#   + secretKeyRef        — credentials injected from the K8s Secret (sourced from Vault)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lab-report-runner
  namespace: argo
  labels:
    app: lab-demo
spec:
  entrypoint: main

  # All pods in this workflow run as lab-report-sa.
  # In the POC this is: serviceAccountName: calendar-uploader
  serviceAccountName: lab-report-sa

  arguments:
    parameters:
      - name: run-summary
        value: "true"
        enum: ["true", "false"]
      - name: run-cleanup
        value: "false"
        enum: ["true", "false"]
      - name: run-audit
        value: "false"
        enum: ["true", "false"]

  templates:

    - name: main
      inputs:
        parameters:
          - name: is-manual-run
            value: "true"
          - name: run-summary
          - name: run-cleanup
          - name: run-audit
      steps:
        - - name: summary-report
            template: run-report
            when: "'{{inputs.parameters.run-summary}}' == 'true'"
            arguments:
              parameters:
                - name: report-name
                  value: "summary"
                - name: is-manual-run
                  value: "{{inputs.parameters.is-manual-run}}"

          - name: cleanup-report
            template: run-report
            when: "'{{inputs.parameters.run-cleanup}}' == 'true'"
            arguments:
              parameters:
                - name: report-name
                  value: "cleanup"
                - name: is-manual-run
                  value: "{{inputs.parameters.is-manual-run}}"

          - name: audit-report
            template: run-report
            when: "'{{inputs.parameters.run-audit}}' == 'true'"
            arguments:
              parameters:
                - name: report-name
                  value: "audit"
                - name: is-manual-run
                  value: "{{inputs.parameters.is-manual-run}}"

        - - name: notify
            template: run-report
            arguments:
              parameters:
                - name: report-name
                  value: "notify"
                - name: is-manual-run
                  value: "{{inputs.parameters.is-manual-run}}"

    - name: run-report
      inputs:
        parameters:
          - name: report-name
          - name: is-manual-run
      container:
        image: alpine:latest
        command: [sh, -c]
        args:
          - |
            if [ "{{inputs.parameters.is-manual-run}}" = "true" ]; then
              MODE="Manual"
            else
              MODE="Automated (CronWorkflow)"
            fi
            echo "=== {{inputs.parameters.report-name}} | Mode: $MODE ==="
            echo "Credentials loaded from Vault (via K8s Secret):"
            echo "  username : $USERNAME"
            echo "  endpoint : $ENDPOINT"
            echo "  password : [$(echo "$PASSWORD" | wc -c | tr -d ' ') chars, not printed]"
            sleep 3
            echo "=== {{inputs.parameters.report-name}} complete ==="
        env:
          # Injected from the K8s Secret that was synced from Vault.
          # In AKS this Secret would be synced from Azure Key Vault via ESO or CSI driver.
          # The pod spec is identical regardless of the secret backend.
          - name: USERNAME
            valueFrom:
              secretKeyRef:
                name: lab-report-secrets
                key: username
          - name: PASSWORD
            valueFrom:
              secretKeyRef:
                name: lab-report-secrets
                key: password
          - name: ENDPOINT
            valueFrom:
              secretKeyRef:
                name: lab-report-secrets
                key: endpoint
