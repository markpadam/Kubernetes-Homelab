# ── Phase 2: Your first Workflow ─────────────────────────────────────────────
#
# Concepts covered:
#   - Workflow        — a single run; creates real pods in Kubernetes
#   - entrypoint      — which template runs first (like a main() function)
#   - template        — a reusable step definition (the actual work)
#   - steps           — run templates in sequence (one row = one stage)
#   - container       — each step runs in its own pod/container
#
# Submit this with:
#   kubectl create -f 01-hello-world.yaml
#   argo watch -n argo @latest          # watch it run
#   argo logs -n argo @latest           # view output
#
# Or submit via the UI:
#   http://argo-workflows.aks-lab.local:2746 → Submit Workflow → paste this file
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: hello-world-   # each run gets a unique suffix, e.g. hello-world-x8k2p
  namespace: argo
spec:
  entrypoint: main             # start here — matches the template name below

  templates:

    # ── main ────────────────────────────────────────────────────────────────
    # Orchestrator template: defines the sequence of steps.
    # Each row in `steps` is a stage. Steps in the same row run in parallel.
    # Steps in different rows run sequentially (row 1 finishes before row 2 starts).
    - name: main
      steps:
        - - name: greet              # stage 1: single step
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "Hello from Argo Workflows!"

        - - name: work-a             # stage 2: two steps run in PARALLEL
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "Doing work A..."
          - name: work-b
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "Doing work B at the same time..."

        - - name: finish             # stage 3: runs after both stage-2 steps complete
            template: print-message
            arguments:
              parameters:
                - name: message
                  value: "All done!"

    # ── print-message ────────────────────────────────────────────────────────
    # Worker template: does the actual work.
    # This one just echoes a message — in production this would be your app image.
    - name: print-message
      inputs:
        parameters:
          - name: message            # declared here so the template knows to expect it
      container:
        image: alpine:latest
        command: [sh, -c]
        args: ["echo '{{inputs.parameters.message}}'; sleep 2"]
        #       ↑ Argo's template syntax — replaced at runtime with the actual value
