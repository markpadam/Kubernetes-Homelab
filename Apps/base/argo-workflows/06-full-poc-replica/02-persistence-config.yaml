# ── Phase 7 / Step 2: Workflow Controller Persistence Config ──────────────────
#
# This ConfigMap tells the Argo workflow-controller to archive every completed
# Workflow to Postgres. Without it, Argo only keeps recent runs in etcd and
# prunes them after the TTL.
#
# With archiving enabled:
#   - All runs are searchable in the UI under "Archived Workflows"
#   - History survives controller pod restarts and Argo upgrades
#   - You can query the DB directly: SELECT * FROM argo_workflows;
#
# The POC equivalent is 2-workflow-controller/workflow-controller-configmap.yaml.
# We omit the SSO block — our lab uses --auth-mode=client (Step 3 enables that).
#
# IMPORTANT: Apply 01-postgres.yaml first and wait for Postgres to be Ready.
#
# Apply:
#   kubectl apply -f 02-persistence-config.yaml
#
# The controller picks up the ConfigMap automatically — no restart needed.
# Verify archiving is active by running a workflow then checking:
#   kubectl exec -n argo deploy/argo-postgres -- \
#     psql -U argo -d argo_workflows -c "SELECT name, phase, startedat FROM argo_archived_workflows ORDER BY startedat DESC LIMIT 5;"
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: workflow-controller-configmap
  namespace: argo
data:
  persistence: |
    archive: true
    postgresql:
      host: argo-postgres-svc.argo.svc.cluster.local
      port: 5432
      database: argo_workflows
      tableName: argo_workflows
      userNameSecret:
        name: argo-postgres-creds
        key: username
      passwordSecret:
        name: argo-postgres-creds
        key: password
